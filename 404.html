<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Accrew</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary-color, #14b8a6);
            line-height: 1;
            margin: 0;
        }
        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            margin: 1rem 0;
            color: #1f2937;
        }
        .error-message {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.125rem;
            color: #6b7280;
            max-width: 500px;
            margin: 0 auto 2rem;
        }
        .error-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--primary-color, #14b8a6);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
        }
        .error-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .error-link.secondary {
            background: transparent;
            color: var(--primary-color, #14b8a6);
            border: 2px solid var(--primary-color, #14b8a6);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">
            The page you're looking for doesn't exist. It may have been moved or deleted.
        </p>
        <div class="error-links">
            <a href="/" class="error-link">Go to Homepage</a>
            <a href="mailto:hello@accrew.ai" class="error-link secondary">Contact Us</a>
        </div>
    </div>
</body>
</html>
