<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ACCREW Monogram Logo - Black/White/Gold -->

  <!-- Mark: Interlocking A+C -->
  <g id="mark">
    <!-- Gold A -->
    <path d="M 20 50 L 30 20 L 40 50 M 24 38 L 36 38"
          stroke="#D4AF37"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Black C wrapping around A -->
    <path d="M 45 25 C 45 17 38 12 30 12 C 22 12 15 17 15 25 L 15 35 C 15 43 22 48 30 48 C 38 48 45 43 45 35"
          stroke="#000000"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- Wordmark: ACCREW -->
  <text x="60" y="40"
        font-family="'Space Grotesk', sans-serif"
        font-size="28"
        font-weight="600"
        letter-spacing="3.5"
        fill="#000000">
    ACCREW
  </text>
</svg>
